name: Smoke Deploy Action

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  local-action-metadata:
    name: Load local action metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Guard Docker action metadata contexts
        run: |
          if grep -En '\$\{\{ *(github|env)\.' action.yml; then
            echo "Do not use runner contexts in Docker action metadata; parse runner env inside the container script instead."
            exit 1
          fi

      - name: Local deploy path reaches CLI
        id: local_deploy
        continue-on-error: true
        uses: ./
        with:
          env: smoke-env

      - name: Assert local deploy failed only after action loaded
        if: ${{ steps.local_deploy.outcome != 'failure' }}
        run: |
          echo "Expected local deploy smoke to fail because credentials are intentionally absent."
          echo "Actual outcome: ${{ steps.local_deploy.outcome }}"
          exit 1

      - name: Local preview path reaches CLI
        id: local_preview
        continue-on-error: true
        uses: ./
        with:
          preview: "true"
          env: preview-smoke
          app: smoke-app
          from: production
          ttl-hours: "1"
          idle-hours: "2"
          prevent-destroy: "true"

      - name: Assert local preview failed only after action loaded
        if: ${{ steps.local_preview.outcome != 'failure' }}
        run: |
          echo "Expected local preview smoke to fail because credentials are intentionally absent."
          echo "Actual outcome: ${{ steps.local_preview.outcome }}"
          exit 1

      - name: Write closed pull request event fixture
        run: |
          printf '%s\n' '{"action":"closed"}' > closed-pr-event.json

      - name: Local preview delete path reaches CLI
        id: local_preview_delete
        continue-on-error: true
        uses: ./
        env:
          GITHUB_EVENT_NAME: pull_request
          GITHUB_EVENT_PATH: /github/workspace/closed-pr-event.json
        with:
          preview: "true"
          delete-on-pr-close: "true"
          env: preview-smoke

      - name: Assert local preview delete failed only after action loaded
        if: ${{ steps.local_preview_delete.outcome != 'failure' }}
        run: |
          echo "Expected local preview delete smoke to fail because credentials are intentionally absent."
          echo "Actual outcome: ${{ steps.local_preview_delete.outcome }}"
          exit 1

  published-main-metadata:
    name: Load published main action metadata
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Published main deploy path reaches CLI
        id: main_deploy
        continue-on-error: true
        uses: quaveone/quaveone-deploy-action@main
        with:
          env: smoke-env

      - name: Assert published main deploy failed only after action loaded
        if: ${{ steps.main_deploy.outcome != 'failure' }}
        run: |
          echo "Expected published main deploy smoke to fail because credentials are intentionally absent."
          echo "Actual outcome: ${{ steps.main_deploy.outcome }}"
          exit 1

      - name: Published main preview path reaches CLI
        id: main_preview
        continue-on-error: true
        uses: quaveone/quaveone-deploy-action@main
        with:
          preview: "true"
          env: preview-smoke
          app: smoke-app
          from: production
          ttl-hours: "1"
          idle-hours: "2"
          prevent-destroy: "true"

      - name: Assert published main preview failed only after action loaded
        if: ${{ steps.main_preview.outcome != 'failure' }}
        run: |
          echo "Expected published main preview smoke to fail because credentials are intentionally absent."
          echo "Actual outcome: ${{ steps.main_preview.outcome }}"
          exit 1

      - name: Write closed pull request event fixture for published main
        run: |
          printf '%s\n' '{"action":"closed"}' > closed-pr-event.json

      - name: Published main preview delete path reaches CLI
        id: main_preview_delete
        continue-on-error: true
        uses: quaveone/quaveone-deploy-action@main
        env:
          GITHUB_EVENT_NAME: pull_request
          GITHUB_EVENT_PATH: /github/workspace/closed-pr-event.json
        with:
          preview: "true"
          delete-on-pr-close: "true"
          env: preview-smoke

      - name: Assert published main preview delete failed only after action loaded
        if: ${{ steps.main_preview_delete.outcome != 'failure' }}
        run: |
          echo "Expected published main preview delete smoke to fail because credentials are intentionally absent."
          echo "Actual outcome: ${{ steps.main_preview_delete.outcome }}"
          exit 1
