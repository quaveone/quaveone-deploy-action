name: QuaveONE Deploy
author: QuaveONE <support@zcloud.ws>
description: GitHub action to deploy content on QuaveONE platform.
branding:
  icon: upload-cloud
  color: green
inputs:
  user-token:
    description: 'Token to authenticate the user'
    required: false
  env-token:
    description: 'Token to authenticate the app environment'
    required: false
  env:
    description: 'Environment name to create or update'
    required: true
  dir:
    description: 'Directory usage as source code to send to deploy (Optional, default value is current dir)'
    required: false
    default: ""
  image:
    description: 'Image name to deploy'
    required: false
    default: ""
  app:
    description: 'Name of the app in which the environment will be created or updated (requires usage together with the --create argument)'
    required: false
    default: ""
  copy-env-vars-from:
    description: 'Name of the environment from which the env vars will be copied to the new environment (requires usage together with the --create argument)'
    required: false
    default: ""
  api-cli-uri:
    description: 'Custom API URL for full private region deployments'
    required: false
    default: ""
  cli-extra-args:
    description: 'CLI extra arguments.'
    required: false
runs:
  using: 'docker'
  image: docker://quaveone/quaveone-cli:v1.0.28
  env:
    QUAVEONE_USER_TOKEN: ${{ inputs.user-token }}
    QUAVEONE_ENV_TOKEN: ${{ inputs.env-token }}
    QUAVEONE_ENV_NAME: ${{ inputs.env }}
    QUAVEONE_SRC_DIR: ${{ inputs.dir }}
    QUAVEONE_IMAGE: ${{ inputs.image }}
    QUAVEONE_APP_SLUG: ${{ inputs.app }}
    QUAVEONE_COPY_ENV_VARS_FROM: ${{ inputs.copy-env-vars-from }}
    QUAVEONE_API_CLI_URI: ${{ inputs.api-cli-uri }}
  entrypoint: sh
  args:
    - -c
    - 'quaveone deploy ${{ inputs.cli-extra-args }}'
